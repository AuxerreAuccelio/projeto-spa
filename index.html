<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
    <title>Projeto SPA</title>
  </head>
  <body>
    <header>
      <h1>Painel de Ferramentas</h1>
    </header>

    <div class="container">
      <aside>
        <nav aria-label="Desafios">
          <button id="btn1" aria-selected="false">Moedas</button>
          <button id="btn2" aria-selected="false">IMC</button>
          <button id="btn3" aria-selected="false">Temperatura</button>
          <button id="btn4" aria-selected="false">Velocidade</button>
          <button id="btn5" aria-selected="false">Massa</button>
          <button id="btn6" aria-selected="false">Regra de 3</button>
        </nav>
      </aside>

      <main>       
        <section id="moedas" hidden> 
          <h2> Conversor de Moedas </h2>
          <form id="formulario">
            <input type="number" id="entrada" placeholder="Digite o valor em Dólares que queira converter para Reais !">
            <button type="submit" id="btn_converter">Converter</button>
          </form>
          <p placeholder="Resultado aparecerá aqui !"></p> 
        </section>
        
        
        
        
        
        
        <section id="imc" hidden>DESAFIO 2</section>
        <section id="temperatura" hidden>DESAFIO 3</section>
        <section id="velocidade" hidden>DESAFIO 4</section>
        <section id="massa" hidden>DESAFIO 5</section>
        <section id="regra3" hidden>DESAFIO 6</section>
      </main>
    </div>

    <footer>
      <p>&copy; Desenvolvido por Alxélio</p>
    </footer>
  </body>
</html>
