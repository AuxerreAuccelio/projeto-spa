<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
    <title>Projeto SPA</title>
  </head>
  <body>
    <header>
      <h1>Painel de Ferramentas</h1>
      <img src="./moon-solid.png" alt="moon">
    </header>

    <div class="container">
      <aside>
        <nav aria-label="Desafios">
          <button id="btn1" aria-selected="false">Moedas</button>
          <button id="btn2" aria-selected="false">IMC</button>
          <button id="btn3" aria-selected="false">Temperatura</button>
          <button id="btn4" aria-selected="false">Velocidade</button>
          <button id="btn5" aria-selected="false">Massa</button>
          <button id="btn6" aria-selected="false">Regra de 3</button>
        </nav>
      </aside>

      <main>       
        <section id="moedas" hidden> 
          <h2> Conversor de Moedas </h2>
            <form id="formulario">
              <input type="number" id="entrada_dolar_real" placeholder="Digite o valor em Dólares que queira converter para Reais !">
              <button type="submit" id="btn_dolar_real">Converter</button>
            </form>
            <p id="dolar_real" placeholder="Resultado aparecerá aqui !"></p> 

            <form id="formulario2">
              <input type="number" id="entrada_real_dolar" placeholder="Digite o valor em Reais que queira converter para Dólares !">
              <button type="submit" id="btn_real_dolar">Converter2</button>
            </form>
            <p id="real_dolar" placeholder="Resultado aparecerá aqui !"></p> 
        </section>
        
        
        
        
        
        <section id="imc" hidden> 
          <h2> Calcular IMC </h2>
          <form id="formulario_imc">
            <input type="number" id="peso" step="0.01" placeholder="Digite o valor da sua massa em Kilograma !">
            <input type="number" id="altura" step="any" placeholder="Digite o valor da altura em metros !">
        
            <div class="grupo_radio">
                <label><input type="radio" name="genero" id="masculino" value="Masculino">Masculino</label>
                <label><input type="radio" name="genero" id="feminino" value="Feminino">Feminino</label>
            </div>    

        
            <button id="btn_radio" type="submit">Calcular</button>
          </form>
          <p id="resultado_imc" placeholder="Resultado aparecerá aqui !"></p> 
        </section>

   
        


        <section id="temperatura" hidden>DESAFIO 3</section>
        <section id="velocidade" hidden>DESAFIO 4</section>
        <section id="massa" hidden>DESAFIO 5</section>






        <section id="regra3" hidden>
          <h2> REGRA DE TRÊS </h2>
          <form id="formulario_regra3">
            <div class="rule3">
              <div class="fr1">
                <input type="number" id="var1" step="0.01" placeholder="Digite o primeiro valor ">
                <input type="number" id="var2" step="any" placeholder="Digite o segundo valor ">
              </div>

              <div class="igual">
                <img src="./igual_print.png" alt="igual">
              </div>
            
              <div class="fr2">
                <input type="number" id="var3" step="0.01" placeholder="Digite o terceiro valor ">
                <input type="text" id="var4" step="0.01" placeholder="Incógnita Y">
              </div>
            </div>
                    
            <button id="btn_regra3" type="submit">Calcular</button>
          </form>
          <p id="resultado_regra3" placeholder="Resultado aparecerá aqui !"></p> 
        </section>



      </main>
    </div>

    <footer>
      <p>&copy; Desenvolvido por Alxélio</p>
    </footer>
  </body>
</html>
